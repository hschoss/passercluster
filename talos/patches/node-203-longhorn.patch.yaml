# Node 203 / 192.168.178.203: OS on /dev/sdh and HDD capacity pool.
# /dev/sdi is intentionally excluded because it currently contains existing partitions.
machine:
  install:
    disk: /dev/sdh
  disks:
    - device: /dev/disk/by-id/ata-ST4000LM024-2AN17V_WFF1ETH5
      partitions:
        - mountpoint: /var/mnt/longhorn-capacity-sdf
    - device: /dev/disk/by-id/ata-ST4000LM024-2AN17V_WFF1JM34
      partitions:
        - mountpoint: /var/mnt/longhorn-capacity-sdg
