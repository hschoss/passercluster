apiVersion: longhorn.io/v1beta2
kind: Node
metadata:
  name: talos-3nt-pq2
  namespace: longhorn-system
  labels:
    app.kubernetes.io/name: longhorn
    app.kubernetes.io/part-of: storage
spec:
  allowScheduling: true
  tags:
    - performance
    - performance-primary
    - nvme
    - nvme-202
  disks:
    default-disk-1030400000000:
      path: /var/lib/longhorn/
