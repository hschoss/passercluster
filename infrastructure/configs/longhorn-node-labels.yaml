      evictionRequested: false
      storageReserved: 199711320473
      tags:
        - nvme
        - node-202
        - nvme-202
    sdb-ssd:
      path: /var/mnt/longhorn-sdb
      allowScheduling: true
      evictionRequested: false
      storageReserved: 53687091200
