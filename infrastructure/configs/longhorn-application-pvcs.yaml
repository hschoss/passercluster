---
# Template only: copy into the owning application namespace before use.
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: nextcloud-data
  namespace: nextcloud
  labels:
    app.kubernetes.io/name: nextcloud
    app.kubernetes.io/part-of: storage
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: longhorn-nextcloud-fast
  resources:
    requests:
      storage: 1.5Ti
