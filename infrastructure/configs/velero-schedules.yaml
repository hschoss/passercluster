apiVersion: velero.io/v1
kind: Schedule
metadata:
  name: daily-critical-apps
  namespace: velero
spec:
  schedule: "0 3 * * *"
  template:
    includedNamespaces:
      - nextcloud
      - immich
      - paperless-ngx
      - vaultwarden
    excludedNamespaces:
      - jellyfin
    storageLocation: default
    ttl: 336h
    snapshotVolumes: false
    defaultVolumesToFsBackup: true
