---
apiVersion: v1
kind: Namespace
metadata:
  name: homelab-dns
  labels:
    toolkit.fluxcd.io/tenant: sre-team
---
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: coredns
  namespace: homelab-dns
spec:
  interval: 24h
  url: https://coredns.github.io/helm
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: coredns
  namespace: homelab-dns
spec:
  interval: 12h
  install:
    strategy:
      name: RetryOnFailure
  upgrade:
    strategy:
      name: RetryOnFailure
  chart:
    spec:
      chart: coredns
      version: ">=1.39.0"
      sourceRef:
        kind: HelmRepository
        name: coredns
        namespace: homelab-dns
  values:
    fullnameOverride: homelab-coredns
    replicaCount: 2
    serviceType: LoadBalancer
    service:
      # FritzBox conditional forwarding should point the homelab zone at this IP.
      loadBalancerIP: 192.168.178.240
      annotations:
        metallb.universe.tf/address-pool: lan-pool
    servers:
      - zones:
          - zone: .
        port: 53
        plugins:
          - name: errors
          - name: health
            configBlock: |-
              lameduck 5s
          - name: ready
          - name: log
            parameters: . "{remote} {type} {class} {name} {rcode} {duration}"
          - name: prometheus
            parameters: 0.0.0.0:9153
          # ExternalDNS writes .homelab records into etcd using the CoreDNS provider.
          - name: etcd
            parameters: homelab
            configBlock: |-
              path /skydns
              endpoint http://external-dns-etcd.external-dns.svc.cluster.local:2379
          # Keep general DNS usable from this resolver when clients query non-homelab names.
          - name: forward
            parameters: . 1.1.1.1 9.9.9.9
          - name: cache
            parameters: 30
          - name: loop
          - name: reload
          - name: loadbalance
