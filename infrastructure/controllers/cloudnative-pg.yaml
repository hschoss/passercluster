---
apiVersion: v1
kind: Namespace
metadata:
  name: cnpg-system
  labels:
    toolkit.fluxcd.io/tenant: sre-team
---
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: cloudnative-pg
  namespace: cnpg-system
spec:
  interval: 24h
  url: https://cloudnative-pg.github.io/charts
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: cloudnative-pg
  namespace: cnpg-system
spec:
  releaseName: cnpg
  interval: 12h
  install:
    strategy:
      name: RetryOnFailure
    crds: Create
  upgrade:
    strategy:
      name: RetryOnFailure
    crds: CreateReplace
  chart:
    spec:
      chart: cloudnative-pg
      version: ">=0.28.0"
      sourceRef:
        kind: HelmRepository
        name: cloudnative-pg
        namespace: cnpg-system
  values:
    crds:
      create: true
