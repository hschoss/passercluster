---
apiVersion: v1
kind: Namespace
metadata:
  name: metallb-system
  labels:
    toolkit.fluxcd.io/tenant: sre-team
    pod-security.kubernetes.io/enforce: privileged
    pod-security.kubernetes.io/audit: privileged
    pod-security.kubernetes.io/warn: privileged
---
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: metallb
  namespace: metallb-system
spec:
  interval: 24h
  url: https://metallb.github.io/metallb
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: metallb
  namespace: metallb-system
spec:
  interval: 12h
  install:
    strategy:
      name: RetryOnFailure
    crds: Create
  upgrade:
    strategy:
      name: RetryOnFailure
    crds: CreateReplace
  chart:
    spec:
      chart: metallb
      version: ">=0.13.0"
      sourceRef:
        kind: HelmRepository
        name: metallb
        namespace: metallb-system
