---
apiVersion: v1
kind: Namespace
metadata:
  name: external-dns
  labels:
    toolkit.fluxcd.io/tenant: sre-team
---
apiVersion: v1
kind: Service
metadata:
  name: external-dns-etcd
  namespace: external-dns
spec:
  selector:
    app.kubernetes.io/name: external-dns-etcd
  ports:
    - name: client
      port: 2379
      targetPort: client
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: external-dns-etcd
  namespace: external-dns
spec:
  serviceName: external-dns-etcd
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: external-dns-etcd
  template:
    metadata:
      labels:
        app.kubernetes.io/name: external-dns-etcd
    spec:
      containers:
        - name: etcd
          image: registry.k8s.io/etcd:3.5.21-0
          imagePullPolicy: IfNotPresent
          command:
            - etcd
          args:
            - --name=external-dns-etcd
            - --data-dir=/var/lib/etcd
            - --listen-client-urls=http://0.0.0.0:2379
            - --advertise-client-urls=http://external-dns-etcd.external-dns.svc.cluster.local:2379
          ports:
            - name: client
              containerPort: 2379
          readinessProbe:
            httpGet:
              path: /readyz
              port: client
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /livez
              port: client
            initialDelaySeconds: 15
            periodSeconds: 20
          # DNS entries are declarative: ExternalDNS repopulates etcd from HTTPRoutes after restarts.
          volumeMounts:
            - name: data
              mountPath: /var/lib/etcd
      volumes:
        - name: data
          emptyDir: {}
---
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: external-dns
  namespace: external-dns
spec:
  interval: 24h
  url: https://kubernetes-sigs.github.io/external-dns/
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: external-dns
  namespace: external-dns
spec:
  interval: 12h
  install:
    strategy:
      name: RetryOnFailure
  upgrade:
    strategy:
      name: RetryOnFailure
  chart:
    spec:
      chart: external-dns
      version: ">=1.15.0"
      sourceRef:
        kind: HelmRepository
        name: external-dns
        namespace: external-dns
  values:
    provider:
      name: coredns
    sources:
      # This cluster exposes applications with Gateway API HTTPRoutes, not Ingresses.
      - gateway-httproute
      - service
    domainFilters:
      - homelab
    policy: sync
    registry: noop
    txtOwnerId: passercluster
    extraArgs:
      - --gateway-name=envoy
      - --gateway-namespace=envoy-gateway-system
      - --coredns-prefix=/skydns/
      - --etcd-urls=http://external-dns-etcd.external-dns.svc.cluster.local:2379
      - --ignore-ingress-tls-spec
    rbac:
      create: true
