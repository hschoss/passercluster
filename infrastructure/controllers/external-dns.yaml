---
apiVersion: v1
kind: Namespace
metadata:
  name: external-dns
  labels:
    toolkit.fluxcd.io/tenant: sre-team
---
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: bitnami
  namespace: external-dns
spec:
  interval: 24h
  url: https://charts.bitnami.com/bitnami
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: external-dns-etcd
  namespace: external-dns
spec:
  interval: 12h
  install:
    strategy:
      name: RetryOnFailure
  upgrade:
    strategy:
      name: RetryOnFailure
  chart:
    spec:
      chart: etcd
      version: ">=11.0.0"
      sourceRef:
        kind: HelmRepository
        name: bitnami
        namespace: external-dns
  values:
    replicaCount: 1
    auth:
      rbac:
        create: false
    # DNS entries are declarative: ExternalDNS repopulates etcd from HTTPRoutes after restarts.
    # Avoid a PVC dependency here because StorageClasses are applied later by infra-configs.
    persistence:
      enabled: false
---
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: external-dns
  namespace: external-dns
spec:
  interval: 24h
  url: https://kubernetes-sigs.github.io/external-dns/
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: external-dns
  namespace: external-dns
spec:
  interval: 12h
  dependsOn:
    - name: external-dns-etcd
      namespace: external-dns
  install:
    strategy:
      name: RetryOnFailure
  upgrade:
    strategy:
      name: RetryOnFailure
  chart:
    spec:
      chart: external-dns
      version: ">=1.15.0"
      sourceRef:
        kind: HelmRepository
        name: external-dns
        namespace: external-dns
  values:
    provider:
      name: coredns
    sources:
      # This cluster exposes applications with Gateway API HTTPRoutes, not Ingresses.
      - gateway-httproute
      - service
    domainFilters:
      - homelab
    policy: sync
    registry: noop
    txtOwnerId: passercluster
    extraArgs:
      - --gateway-name=envoy
      - --gateway-namespace=envoy-gateway-system
      - --coredns-prefix=/skydns/
      - --etcd-urls=http://external-dns-etcd.external-dns.svc.cluster.local:2379
      - --ignore-ingress-tls-spec
    rbac:
      create: true
