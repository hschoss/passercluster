apiVersion: v1
kind: Namespace
metadata:
  name: adguard
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: adguard-config
  namespace: adguard
data:
  AdGuardHome.yaml: |
    bind_host: 0.0.0.0
    bind_port: 3000
    users:
      - name: admin
        password: $2a$10$placeholder_change_me
    dns:
      bind_hosts:
        - 0.0.0.0
      port: 53
      rewrites:
        - domain: "*.passer.com"
          answer: 192.168.178.240
    querylog:
      enabled: false
    statistics:
      enabled: false
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: adguard-data
  namespace: adguard
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: longhorn
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: adguard
  namespace: adguard
spec:
  replicas: 1
  selector:
    matchLabels:
      app: adguard
  template:
    metadata:
      labels:
        app: adguard
    spec:
      initContainers:
        - name: init-config
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              if [ ! -f /data/conf/AdGuardHome.yaml ]; then
                mkdir -p /data/conf
                cp /config/AdGuardHome.yaml /data/conf/AdGuardHome.yaml
              fi
          volumeMounts:
            - name: config
              mountPath: /config
            - name: data
              mountPath: /data
      containers:
        - name: adguard
          image: adguard/adguardhome:v0.107.57
          args:
            - --config
            - /data/conf/AdGuardHome.yaml
            - --work-dir
            - /data/work
            - --no-check-update
          ports:
            - containerPort: 53
              protocol: TCP
              name: dns-tcp
            - containerPort: 53
              protocol: UDP
              name: dns-udp
            - containerPort: 3000
              protocol: TCP
              name: admin
          volumeMounts:
            - name: data
              mountPath: /data
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              memory: 256Mi
      volumes:
        - name: config
          configMap:
            name: adguard-config
        - name: data
          persistentVolumeClaim:
            claimName: adguard-data
---
apiVersion: v1
kind: Service
metadata:
  name: adguard-dns
  namespace: adguard
  annotations:
    metallb.universe.tf/loadBalancerIPs: 192.168.178.241
spec:
  type: LoadBalancer
  selector:
    app: adguard
  ports:
    - name: dns-tcp
      port: 53
      targetPort: 53
      protocol: TCP
    - name: dns-udp
      port: 53
      targetPort: 53
      protocol: UDP
---
apiVersion: v1
kind: Service
metadata:
  name: adguard-admin
  namespace: adguard
spec:
  type: ClusterIP
  selector:
    app: adguard
  ports:
    - name: admin
      port: 3000
      targetPort: 3000
