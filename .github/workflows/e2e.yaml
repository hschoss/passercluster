name: e2e

on:
  workflow_dispatch:
  push:
    branches: [ '*' ]
    tags-ignore: [ '*' ]

jobs:
  kubernetes:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Setup Flux
        uses: fluxcd/flux2/action@main
      - name: Setup Kubernetes
        uses: helm/kind-action@v1.12.0
        with:
          cluster_name: flux
          version: v0.30.0
          node_image: kindest/node:v1.33.4
      - name: Install Flux in Kubernetes Kind
        run: flux install --components-extra source-watcher
      - name: Verify checkout state
        run: |
          set -euo pipefail
          git rev-parse HEAD
          git status --short
      - name: Seed gateway TLS for e2e
        run: |
          set -euo pipefail
          tmpdir="$(mktemp -d)"
          trap 'rm -rf "$tmpdir"' EXIT
          cat > "$tmpdir/openssl.cnf" <<'EOF'
          [req]
          default_bits = 4096
          prompt = no
          default_md = sha256
          distinguished_name = req_distinguished_name
          x509_extensions = v3_req

          [req_distinguished_name]
          CN = passer.lan

          [v3_req]
          subjectAltName = @alt_names

          [alt_names]
          DNS.1 = passer.lan
          DNS.2 = *.passer.lan
          EOF
          openssl req -x509 -nodes -newkey rsa:4096 -days 3650             -keyout "$tmpdir/passer-lan.key"             -out "$tmpdir/passer-lan.crt"             -config "$tmpdir/openssl.cnf"             -extensions v3_req
          kubectl create namespace envoy-gateway-system --dry-run=client -o yaml | kubectl apply -f -
          kubectl create secret tls passer-lan-tls             --cert="$tmpdir/passer-lan.crt"             --key="$tmpdir/passer-lan.key"             -n envoy-gateway-system             --dry-run=client -o yaml | kubectl apply -f -
      - name: Setup cluster reconciliation
        run: |
          set -euo pipefail
          flux create source git flux-system             --url=${{ github.event.repository.html_url }}             --branch=${{ github.ref_name }}             --username=${GITHUB_ACTOR}             --password=${{ secrets.GITHUB_TOKEN }}             --ignore-paths="clusters/**/flux-system/"             --interval=1m
          flux create kustomization flux-system             --source=flux-system             --path=./clusters/e2e             --prune=true             --interval=1m             --timeout=10m             --wait=false
      - name: Verify cluster reconciliation
        run: |
          set -euo pipefail
          kubectl -n flux-system wait kustomization/flux-system --for=condition=ready --timeout=10m
          kubectl -n flux-system get kustomizations -o wide
          for name in infra-controllers infra-configs apps; do
            echo "Waiting for Flux Kustomization resource: ${name}"
            for _ in $(seq 1 120); do
              if kubectl -n flux-system get "kustomization/${name}" >/dev/null 2>&1; then
                break
              fi
              sleep 5
            done
            if ! kubectl -n flux-system get "kustomization/${name}" >/dev/null 2>&1; then
              echo "Expected Flux Kustomization ${name} was not created"
              kubectl -n flux-system get kustomizations -o wide || true
              exit 1
            fi
            kubectl -n flux-system wait "kustomization/${name}" --for=condition=ready --timeout=10m
          done
      - name: Verify helm reconciliation
        run: |
          set -euo pipefail
          echo "HelmReleases in the cluster:"
          kubectl get helmreleases.helm.toolkit.fluxcd.io -A || true
          mapfile -t helmreleases < <(
            kubectl get helmreleases.helm.toolkit.fluxcd.io -A               -o jsonpath='{range .items[*]}{.metadata.namespace}{"|"}{.metadata.name}{"\n"}{end}'
          )
          printf 'Structured HelmRelease entries:\n'
          printf '  %s\n' "${helmreleases[@]}"
          if [ "${#helmreleases[@]}" -eq 0 ]; then
            echo "No HelmReleases found"
            exit 1
          fi
          for entry in "${helmreleases[@]}"; do
            namespace="${entry%%|*}"
            name="${entry#*|}"
            if [ -z "$namespace" ] || [ -z "$name" ] || [ "$namespace" = "$name" ]; then
              echo "Invalid HelmRelease entry: '$entry'"
              exit 1
            fi
            echo "namespace='${namespace}' name='${name}'"
            echo "Waiting for HelmRelease: ${namespace}/${name}"
            if ! kubectl -n "$namespace" wait "helmrelease.helm.toolkit.fluxcd.io/${name}" --for=condition=ready --timeout=10m; then
              echo "HelmRelease did not become ready: ${namespace}/${name}"
              kubectl -n "$namespace" describe "helmrelease.helm.toolkit.fluxcd.io/${name}" || true
              kubectl -n "$namespace" get events --sort-by=.lastTimestamp | tail -n 50 || true
              kubectl -n flux-system logs deploy/helm-controller --tail=100 || true
              exit 1
            fi
          done
      - name: Verify gateway routing
        run: |
          set -euo pipefail
          kubectl -n envoy-gateway-system get svc -o wide
          svc_name="$(kubectl -n envoy-gateway-system get svc -l gateway.envoyproxy.io/owning-gateway-name=envoy -o jsonpath='{range .items[*]}{.metadata.name}{"\n"}{end}' | sort | head -n1)"
          if [ -z "${svc_name}" ]; then
            echo "No Envoy Gateway service found"
            kubectl -n envoy-gateway-system get svc -o wide
            exit 1
          fi
          kubectl -n envoy-gateway-system port-forward "svc/${svc_name}" 8080:80 &
          sleep 5
          curl -sSf -H "Host: podinfo-e2e.passer.lan" http://localhost:8080
      - name: List deployed resources
        run: flux tree ks flux-system
      - name: Debug failure
        if: failure()
        run: |
          set +e
          kubectl get ns
          kubectl get pods -A
          kubectl -n flux-system get kustomizations -o wide
          kubectl -n flux-system get sources,kustomizations,helmreleases
          kubectl -n flux-system describe kustomization flux-system
          kubectl -n flux-system describe kustomization infra-controllers || true
          kubectl -n flux-system describe kustomization infra-configs || true
          kubectl -n flux-system describe kustomization apps || true
          kubectl get gateway -A || true
          kubectl describe gateway -A || true
          kubectl get httproute -A || true
          kubectl describe httproute -A || true
          kubectl get secret passer-lan-tls -A || true
          for deploy in source-controller kustomize-controller helm-controller; do
            if kubectl -n flux-system get deploy "${deploy}" >/dev/null 2>&1; then
              kubectl -n flux-system logs deploy/"${deploy}" --tail=100
            fi
          done
          flux get all --all-namespaces
