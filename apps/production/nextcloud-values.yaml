apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: nextcloud
  namespace: nextcloud
spec:
  chart:
    spec:
      version: ">=1.0.0"
  values:
    nextcloud:
      host: nextcloud.passer.lan
    nodeSelector:
      kubernetes.io/hostname: talos-3nt-pq2
    persistence:
      size: 500Gi
      storageClass: longhorn-nvme-202
    mariadb:
      primary:
        nodeSelector:
          kubernetes.io/hostname: talos-3nt-pq2
        persistence:
          size: 20Gi
          storageClass: longhorn-nvme-202
