apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: paperless-ngx
  namespace: paperless-ngx
spec:
  chart:
    spec:
      version: ">=0.1.0"
  values:
    env:
      PAPERLESS_URL: https://paperless.passer.lan
    ingress:
      main:
        enabled: true
        hosts:
          - host: paperless.passer.lan
            paths:
              - path: /
        tls:
          - secretName: passer-lan-tls
            hosts:
              - paperless.passer.lan
