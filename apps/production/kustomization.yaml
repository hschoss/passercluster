apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../base/podinfo
  - ../base/nextcloud
  - ../base/jellyfin
  - ../base/vaultwarden
patches:
  - path: podinfo-values.yaml
    target:
      kind: HelmRelease
      name: podinfo
  - path: nextcloud-values.yaml
    target:
      kind: HelmRelease
      name: nextcloud
  - path: nextcloud-httproute.yaml
    target:
      kind: HTTPRoute
      name: nextcloud
  - path: jellyfin-values.yaml
    target:
      kind: HelmRelease
      name: jellyfin
  - path: jellyfin-httproute.yaml
    target:
      kind: HTTPRoute
      name: jellyfin
  - path: vaultwarden-values.yaml
    target:
      kind: HelmRelease
      name: vaultwarden
  - path: vaultwarden-httproute.yaml
    target:
      kind: HTTPRoute
      name: vaultwarden
