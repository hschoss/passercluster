apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: immich
  namespace: immich
spec:
  interval: 30m

  chartRef:
    kind: OCIRepository
    name: immich

  install:
    remediation:
      retries: 3

  upgrade:
    cleanupOnFail: true
    remediation:
      strategy: rollback
      retries: 3

  values:
    controllers:
      main:
        containers:
          main:
            image:
              tag: v2.6.3
            env:
              DB_HOSTNAME: immich-postgres-rw
              DB_PORT: "5432"
              DB_DATABASE_NAME: immich
              DB_USERNAME: immich
              DB_PASSWORD:
                valueFrom:
                  secretKeyRef:
                    name: immich-db
                    key: password
              REDIS_HOSTNAME: immich-valkey
              IMMICH_MACHINE_LEARNING_URL: http://immich-machine-learning:3003
                
    immich:
      persistence:
        library:
          existingClaim: immich-library
    valkey:
      enabled: true
      persistence:
        data:
          enabled: true
          type: persistentVolumeClaim
          storageClass: longhorn-nvme-201
          size: 2Gi
    
    server:
      enabled: true
      ingress:
        main:
          enabled: false

    machine-learning:
      enabled: true
      persistence:
        cache:
          enabled: true
          type: persistentVolumeClaim
          storageClass: longhorn-nvme-201
          size: 10Gi
