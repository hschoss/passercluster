apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: immich
  namespace: immich
spec:
  interval: 30m
  chart:
    spec:
      chart: immich
      version: ">=0.7.0"
      sourceRef:
        kind: HelmRepository
        name: immich
        namespace: immich
      interval: 12h
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      strategy: rollback
      retries: 3
  values:
    immich:
      persistence:
        library:
          existingClaim: immich-library
    postgresql:
      enabled: true
      auth:
        database: immich
        username: immich
        existingSecret: immich-db
        secretKeys:
          adminPasswordKey: postgres-password
          userPasswordKey: password
      primary:
        persistence:
          storageClass: longhorn-nvme-201
          size: 20Gi
    redis:
      enabled: true
      auth:
        enabled: false
      master:
        persistence:
          enabled: true
          storageClass: longhorn-nvme-201
          size: 2Gi
    ingress:
      main:
        enabled: false
