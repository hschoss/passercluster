apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: vaultwarden
  namespace: vaultwarden
spec:
  interval: 30m
  chart:
    spec:
      chart: vaultwarden
      version: ">=0.1.0"
      sourceRef:
        kind: HelmRepository
        name: vaultwarden
        namespace: vaultwarden
      interval: 12h
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      strategy: rollback
      retries: 3
  values:
    ingress:
      enabled: false
    storage:
      data:
        name: vaultwarden-data
        accessMode: ReadWriteOnce
        class: longhorn
        size: 2Gi
