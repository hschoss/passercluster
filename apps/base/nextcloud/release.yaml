apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: nextcloud
  namespace: nextcloud
spec:
  interval: 12h
  releaseName: nextcloud
  chart:
    spec:
      chart: nextcloud
      sourceRef:
        kind: HelmRepository
        name: nextcloud
        namespace: nextcloud
  install:
    strategy:
      name: RetryOnFailure
  upgrade:
    strategy:
      name: RetryOnFailure
  values:
    nextcloud:
      host: nextcloud.local
      existingSecret:
        enabled: true
        secretName: nextcloud-credentials
        usernameKey: nextcloud-username
        passwordKey: nextcloud-password
      configs:
        proxy.config.php: |-
          <?php
          $CONFIG = array(
            'trusted_proxies' => ['10.244.0.0/16'],
            'forwarded_for_headers' => ['HTTP_X_FORWARDED_FOR'],
          );
    persistence:
      enabled: true
      storageClass: longhorn
      size: 8Gi
    mariadb:
      enabled: true
      auth:
        database: nextcloud
        username: nextcloud
        existingSecret: nextcloud-db
      primary:
        persistence:
          enabled: true
          storageClass: longhorn
          size: 2Gi
    phpClientHttpsFix:
      enabled: false
    ingress:
      enabled: false
