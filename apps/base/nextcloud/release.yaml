apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: nextcloud
  namespace: nextcloud
spec:
  interval: 12h
  releaseName: nextcloud
  chart:
    spec:
      chart: nextcloud
      sourceRef:
        kind: HelmRepository
        name: nextcloud
        namespace: nextcloud
  install:
    strategy:
      name: RetryOnFailure
  upgrade:
    strategy:
      name: RetryOnFailure
  values:
    nextcloud:
      host: nextcloud.passer.home.arpa
      existingSecret:
        enabled: true
        secretName: nextcloud-credentials
        usernameKey: nextcloud-username
        passwordKey: nextcloud-password
      configs:
        proxy.config.php: |-
          <?php
          $CONFIG = array(
            'trusted_proxies' => ['10.244.0.0/16'],
            'forwarded_for_headers' => ['HTTP_X_FORWARDED_FOR'],
          );
        domain.config.php: |-
          <?php
          $CONFIG = array(
            'trusted_domains' => ['nextcloud.passer.home.arpa', 'home.arpahost'],
            'overwrite.cli.url' => 'https://nextcloud.passer.home.arpa',
          );
    persistence:
      enabled: true
      storageClass: longhorn-nextcloud-fast
      size: 8Gi
    mariadb:
      enabled: true
      auth:
        database: nextcloud
        username: nextcloud
        existingSecret: nextcloud-db
      primary:
        persistence:
          enabled: true
          storageClass: longhorn-nextcloud-fast
          size: 2Gi
    livenessProbe:
      httpHeaders:
        - name: Host
          value: nextcloud.passer.home.arpa
    readinessProbe:
      httpHeaders:
        - name: Host
          value: nextcloud.passer.home.arpa
    startupProbe:
      httpHeaders:
        - name: Host
          value: nextcloud.passer.home.arpa
    phpClientHttpsFix:
      enabled: false
    ingress:
      enabled: false
