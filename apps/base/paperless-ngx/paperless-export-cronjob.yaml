apiVersion: batch/v1
kind: CronJob
metadata:
  name: paperless-document-export
  namespace: paperless-ngx
spec:
  schedule: "15 2 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: OnFailure
          containers:
            - name: exporter
              image: ghcr.io/paperless-ngx/paperless-ngx:2.14.7
              command:
                - /bin/bash
                - -lc
                - |
                  set -euo pipefail

                  EXPORT_DIR="/usr/src/paperless/export/backup-$(date +%F-%H%M%S)"
                  mkdir -p "${EXPORT_DIR}"

                  echo "Starting Paperless export to ${EXPORT_DIR}"
                  document_exporter "${EXPORT_DIR}"

                  echo "Keeping latest 14 exports"
                  find /usr/src/paperless/export -maxdepth 1 -type d -name 'backup-*' | sort | head -n -14 | xargs -r rm -rf

                  echo "Done"
              env:
                - name: A_REDIS_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: paperless-ngx-redis
                      key: redis-password
                - name: PAPERLESS_ADMIN_USER
                  value: admin
                - name: PAPERLESS_DBENGINE
                  value: postgresql
                - name: PAPERLESS_DBHOST
                  value: paperless-ngx-postgresql
                - name: PAPERLESS_DBNAME
                  value: paperless
                - name: PAPERLESS_DBPASS
                  valueFrom:
                    secretKeyRef:
                      name: paperless-ngx-postgresql
                      key: postgres-password
                - name: PAPERLESS_DBUSER
                  value: postgres
                - name: PAPERLESS_OCR_LANGUAGE
                  value: deu+eng
                - name: PAPERLESS_PORT
                  value: "8000"
                - name: PAPERLESS_REDIS
                  value: redis://:$(A_REDIS_PASSWORD)@paperless-ngx-redis-master
                - name: PAPERLESS_TIME_ZONE
                  value: Europe/Berlin
                - name: PAPERLESS_URL
                  value: https://paperless.passer.lan
                - name: TZ
                  value: Europe/Berlin
              volumeMounts:
                - name: consume
                  mountPath: /usr/src/paperless/consume
                - name: data
                  mountPath: /usr/src/paperless/data
                - name: export
                  mountPath: /usr/src/paperless/export
                - name: media
                  mountPath: /usr/src/paperless/media
          volumes:
            - name: consume
              persistentVolumeClaim:
                claimName: paperless-ngx-consume
            - name: data
              persistentVolumeClaim:
                claimName: paperless-ngx-data
            - name: export
              persistentVolumeClaim:
                claimName: paperless-ngx-export
            - name: media
              persistentVolumeClaim:
                claimName: paperless-ngx-media
