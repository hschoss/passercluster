apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: paperless-ngx
  namespace: paperless-ngx
spec:
  interval: 30m
  chart:
    spec:
      chart: paperless-ngx
      version: ">=0.1.0"
      sourceRef:
        kind: HelmRepository
        name: paperless-ngx
        namespace: paperless-ngx
  values:
    env:
      PAPERLESS_TIME_ZONE: Europe/Berlin
      PAPERLESS_OCR_LANGUAGE: deu+eng
      PAPERLESS_URL: https://paperless.your-domain.com
    persistence:
      data:
        enabled: true
        storageClass: ""   # fill in your StorageClass
        size: 10Gi
      media:
        enabled: true
        size: 50Gi
      consume:
        enabled: true
        size: 5Gi
    postgresql:
      enabled: true
    redis:
      enabled: true
  valuesFrom:
    - kind: Secret
      name: paperless-ngx-secret
      valuesKey: PAPERLESS_ADMIN_USER
      targetPath: env.PAPERLESS_ADMIN_USER
    # repeat for PASSWORD and SECRET_KEY
