apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: authentik
  namespace: authentik
spec:
  interval: 12h
  releaseName: authentik
  chart:
    spec:
      chart: authentik
      version: ">=2026.5.3"
      sourceRef:
        kind: HelmRepository
        name: authentik
        namespace: authentik
  install:
    strategy:
      name: RetryOnFailure
  upgrade:
    strategy:
      name: RetryOnFailure
  values:
    authentik:
      existingSecret:
        secretName: authentik-credentials
    postgresql:
      enabled: false
